<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心灵小屋 - 你的私密陪伴空间</title>
    <link rel="stylesheet" href="../src/css/main.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
        }
        
        .welcome-container {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
            max-width: 500px;
        }
        
        .logo {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            margin-bottom: 24px;
            object-fit: cover;
            border: 4px solid var(--primary-color);
        }
        
        h1 {
            font-size: 32px;
            color: var(--primary-color);
            margin-bottom: 12px;
        }
        
        .subtitle {
            font-size: 16px;
            color: var(--text-secondary);
            margin-bottom: 32px;
        }
        
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .btn {
            padding: 14px 32px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(155, 89, 182, 0.3);
        }
        
        .btn-secondary {
            background: white;
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
        }
        
        .btn-secondary:hover {
            background: var(--primary-light);
            color: white;
        }
        
        .version {
            margin-top: 24px;
            font-size: 12px;
            color: var(--text-light);
        }
    </style>
</head>
<body>
    <div class="welcome-container">
        <div class="logo" style="font-size: 80px; margin-bottom: 20px;">💙</div>
        <h1>心灵小屋</h1>
        <p class="subtitle">你的私密陪伴空间 · 温暖 · 真诚 · 守护隐私</p>
        
        <div class="btn-group">
            <a href="login.html" class="btn btn-primary">开始对话</a>
            <a href="chat.html" class="btn btn-secondary">游客模式（快速体验）</a>
        </div>
        
        <p class="version">Version 1.0.0 · 青少年心理健康对话系统</p>
    </div>
    
    <script src="../config.js"></script>
    <script>
        // 自动跳转逻辑
        document.addEventListener('DOMContentLoaded', () => {
            const userMode = localStorage.getItem('userMode');
            const userInfo = localStorage.getItem('userInfo');
            
            // 如果已登录，直接跳转到聊天页面
            if (userMode === 'user' && userInfo) {
                window.location.href = 'chat.html';
            }
        });
    </script>
</body>
</html>
