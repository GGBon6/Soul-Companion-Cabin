<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心灵小屋 - 重置密码</title>
    <link rel="stylesheet" href="../src/css/main.css">
    <link rel="stylesheet" href="../src/css/login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo-section">
                <div class="logo" style="font-size: 60px;">🔑</div>
                <h1>重置密码</h1>
                <p class="subtitle">为你的账号设置一个新密码</p>
            </div>

            <!-- 重置密码表单 -->
            <form id="resetPasswordForm" class="auth-form">
                <div class="form-group">
                    <label for="reset-username">用户名</label>
                    <input type="text" id="reset-username" placeholder="请输入用户名" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="reset-new-password">新密码</label>
                    <input type="password" id="reset-new-password" placeholder="至少6个字符" required autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label for="reset-confirm-password">确认新密码</label>
                    <input type="password" id="reset-confirm-password" placeholder="再次输入新密码" required autocomplete="new-password">
                </div>
                <button type="submit" class="btn-primary">重置密码</button>
                <p class="switch-form">
                    <a href="login.html">返回登录</a>
                </p>
            </form>

            <!-- 消息提示 -->
            <div id="messageBox" class="message-box"></div>
        </div>
    </div>

    <!-- 新模块化架构脚本 -->
    <script src="../config.js"></script>
    <script src="../src/js/utils.js"></script>
    <script src="../src/js/auth.js"></script>
    <script>
        // 重置密码页面逻辑
        class ResetPasswordPage {
            constructor() {
                this.authManager = new AuthManager();
                this.initElements();
                this.bindEvents();
            }
            
            initElements() {
                this.resetPasswordForm = document.getElementById('resetPasswordForm');
                this.messageBox = document.getElementById('messageBox');
                
                this.resetUsername = document.getElementById('reset-username');
                this.resetNewPassword = document.getElementById('reset-new-password');
                this.resetConfirmPassword = document.getElementById('reset-confirm-password');
            }
            
            bindEvents() {
                this.resetPasswordForm.addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.handleResetPassword();
                });
            }
            
            showMessage(message, type = 'info') {
                this.messageBox.textContent = message;
                this.messageBox.className = `message-box ${type}`;
                this.messageBox.style.display = 'block';
            }
            
            hideMessage() {
                this.messageBox.style.display = 'none';
            }
            
            async handleResetPassword() {
                const username = this.resetUsername.value.trim();
                const newPassword = this.resetNewPassword.value.trim();
                const confirmPassword = this.resetConfirmPassword.value.trim();
                
                // 验证输入
                if (!username) {
                    this.showMessage('请输入用户名', 'error');
                    return;
                }
                
                if (!newPassword) {
                    this.showMessage('请输入新密码', 'error');
                    return;
                }
                
                if (newPassword.length < 6) {
                    this.showMessage('密码至少需要6个字符', 'error');
                    return;
                }
                
                if (newPassword !== confirmPassword) {
                    this.showMessage('两次输入的密码不一致', 'error');
                    return;
                }
                
                this.showMessage('正在重置密码...', 'info');
                
                try {
                    const result = await this.authManager.resetPassword(username, newPassword);
                    this.showMessage('密码重置成功！3秒后跳转到登录页面...', 'success');
                    
                    // 清空表单
                    this.resetPasswordForm.reset();
                    
                    // 3秒后跳转到登录页面
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 3000);
                } catch (error) {
                    this.showMessage(error.message || '密码重置失败', 'error');
                }
            }
        }
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            new ResetPasswordPage();
        });
    </script>
</body>
</html>
