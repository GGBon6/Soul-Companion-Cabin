# 生产环境配置
# Production Environment Configuration

environment: production
debug: false

server:
  host: "0.0.0.0"
  port: 8766
  http_port: 8080

features:
  enable_ota: true
  enable_websocket: true
  enable_http_api: true
  enable_metrics: true

ai:
  llm:
    model: "qwen-plus"
    max_tokens: 2000
    temperature: 0.7
  
  asr:
    model: "paraformer-realtime-v2"
    sample_rate: 16000
  
  tts:
    model: "cosyvoice-v2"
    voice: "longhan_v2"
    sample_rate: 22050
    volume: 50
    speech_rate: 1.0

websocket:
  heartbeat_interval: 30
  heartbeat_timeout: 60
  idle_timeout: 600

history:
  max_messages: 100
  max_context: 30

logging:
  level: "INFO"
  file: "app.log"

security:
  rate_limit:
    enabled: true
    requests_per_minute: 60
  
  cors:
    enabled: true
    origins: ["*"]
