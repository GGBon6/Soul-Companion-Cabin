# 日志配置文件
# Logging Configuration

version: 1
disable_existing_loggers: false

# 格式化器
formatters:
  default:
    format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
    datefmt: '%Y-%m-%d %H:%M:%S'
  
  detailed:
    format: '%(asctime)s - %(name)s - %(levelname)s - [%(filename)s:%(lineno)d] - %(message)s'
    datefmt: '%Y-%m-%d %H:%M:%S'
  
  json:
    class: pythonjsonlogger.jsonlogger.JsonFormatter
    format: '%(asctime)s %(name)s %(levelname)s %(message)s'

# 处理器
handlers:
  console:
    class: logging.StreamHandler
    level: DEBUG
    formatter: default
    stream: ext://sys.stdout
  
  file:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: detailed
    filename: logs/app.log
    maxBytes: 10485760  # 10MB
    backupCount: 5
    encoding: utf8
  
  error_file:
    class: logging.handlers.RotatingFileHandler
    level: ERROR
    formatter: detailed
    filename: logs/error.log
    maxBytes: 10485760  # 10MB
    backupCount: 5
    encoding: utf8

# 日志记录器
loggers:
  app:
    level: DEBUG
    handlers: [console, file, error_file]
    propagate: false
  
  app.handlers:
    level: DEBUG
    handlers: [console, file]
    propagate: false
  
  app.services:
    level: INFO
    handlers: [console, file]
    propagate: false
  
  aiohttp:
    level: WARNING
    handlers: [console]
    propagate: false
  
  websockets:
    level: WARNING
    handlers: [console]
    propagate: false

# 根日志记录器
root:
  level: INFO
  handlers: [console, file, error_file]
